name: Titanium Cloud Core

on:
  push:
  workflow_dispatch:

jobs:
  run-titanium:
    runs-on: ubuntu-latest

    steps:
      - name: Repo letöltés
        uses: actions/checkout@v3

      - name: Python telepítés
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Függőségek telepítése
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pandas stripe requests python-dotenv

      - name: Titanium indítása
        run: |
          python core/auto_optimizer.py
