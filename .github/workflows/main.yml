name: Titanium Cloud Core - MAX MODE

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 14 * * *'
    - cron: '0 20 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-titanium:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          pip install stripe requests google-api-python-client google-auth-oauthlib moviepy
      - name: 🚀 Autonóm Munkafolyamat
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python core/titanium_dual_engine.py
          python core/video_creator.py
          python core/b2b_email_sender.py
