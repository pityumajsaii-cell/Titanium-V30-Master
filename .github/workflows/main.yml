name: Titanium Cloud Core - MAX MODE

on:
  schedule:
    - cron: '0 8,14,20 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-titanium:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install stripe requests google-api-python-client google-auth-oauthlib moviepy imageio imageio-ffmpeg

      - name: 🚀 Autonóm Munkafolyamat (Social Integration)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_API_TOKEN: ${{ secrets.YOUTUBE_API_TOKEN }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          INSTAGRAM_GRAPH_TOKEN: ${{ secrets.INSTAGRAM_GRAPH_TOKEN }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
        run: |
          python core/titanium_dual_engine.py || echo "AI hiba"
          python core/video_creator.py || echo "Video hiba"
          python core/social_poster.py || echo "Social hiba"
          python core/b2b_email_sender.py || echo "Email hiba"
          python core/profit_report.py || echo "Report hiba"
          python core/github_auto.py || echo "Git hiba"
