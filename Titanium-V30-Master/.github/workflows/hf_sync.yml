name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://pityumajsaii-cell:$HF_TOKEN@huggingface.co/spaces/${{ secrets.HF_USERNAME }}/Titanium-V30-Apex main
